<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script src="../../assets/lf-filters.js"></script>
<script type="text/babel">
const { AskCard, ChoiceCards, BreatheCircle } = window.LittleFablesDesignSystem_d603a2;

function LanternArt() {
  return (
    <svg width="64" height="72" viewBox="0 0 64 72">
      <path d="M20 22 h24 l4 30 q -16 8 -32 0 z" fill="#EFC85C" opacity="0.8" filter="url(#lf-wash-edge)"></path>
      <g fill="none" stroke="var(--ink)" strokeWidth="2.2" filter="url(#lf-wobble)">
        <path d="M20 22 h24 l4 30 q -16 8 -32 0 z"></path>
        <path d="M26 22 q 6 -12 12 0"></path>
        <path d="M28 34 q 4 8 8 0" strokeWidth="1.8"></path>
        <path d="M22 62 h20" strokeWidth="2"></path>
      </g>
    </svg>
  );
}
function RopeArt() {
  return (
    <svg width="64" height="72" viewBox="0 0 64 72">
      <path d="M18 20 q 26 -8 28 12 q 2 18 -22 16 q -14 -2 -10 -14 q 4 -10 18 -8" fill="none" stroke="#C89A5E" strokeWidth="9" strokeLinecap="round" opacity="0.85" filter="url(#lf-wash-edge)"></path>
      <g fill="none" stroke="var(--ink)" strokeWidth="1.8" filter="url(#lf-wobble)">
        <path d="M18 20 q 26 -8 28 12 q 2 18 -22 16 q -14 -2 -10 -14 q 4 -10 18 -8"></path>
        <path d="M22 18 l4 6 M32 16 l3 6 M42 18 l2 7 M46 30 l-6 3 M42 44 l-5 -4 M28 46 l-2 -6" strokeWidth="1.3" opacity="0.8"></path>
      </g>
    </svg>
  );
}

function Demo() {
  const [mic, setMic] = React.useState(false);
  const [picked, setPicked] = React.useState(null);
  return (
    <div style={{ display: "flex", gap: 30, alignItems: "center", justifyContent: "center", padding: "22px 24px", flexWrap: "wrap" }}>
      <AskCard question="What should Miko carry across?" micActive={mic} onMic={function () { setMic(!mic); }} width={330}></AskCard>
      <ChoiceCards
        size={150}
        picked={picked}
        onPick={setPicked}
        choices={[
          { id: "lantern", label: "the lantern", art: <LanternArt></LanternArt> },
          { id: "rope", label: "the rope", art: <RopeArt></RopeArt> }
        ]}
      ></ChoiceCards>
      <BreatheCircle size={200}></BreatheCircle>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo></Demo>);
</script>
</body>
</html>
