<!-- @dsCard group="Sound" viewport="700x190" name="Foley Families" subtitle="Real materials only, one family per intent — no jingles, no synth tones, ever" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 16px; padding: 18px 24px; align-items: stretch; }
  .fam { flex: 1; border-radius: var(--radius-card); background-color: var(--surface-card); background-image: var(--texture-paper); padding: 14px 16px; box-sizing: border-box; color: var(--ink); }
  .fam h4 { font-family: var(--font-display); font-size: 20px; font-weight: 400; margin: 0 0 4px; }
  .fam .use { font-family: var(--font-parent); font-size: 11px; color: var(--ink-soft); line-height: 1.5; }
  .wave { margin: 8px 0 2px; }
</style>
</head>
<body>
  <div class="fam lf-drawn-border" style="color: var(--pigment-river);">
    <h4 style="color: var(--ink);">paper</h4>
    <svg class="wave" width="100%" height="20" viewBox="0 0 160 20" preserveAspectRatio="none"><path d="M2 12 q 10 -8 20 -2 t 22 -4 t 24 6 t 26 -6 t 30 2 t 34 0" fill="none" stroke="currentColor" stroke-width="2" filter="url(#lf-wobble)"></path></svg>
    <div class="use">navigation &amp; pages — page turn, card slide, endpaper leaf</div>
  </div>
  <div class="fam lf-drawn-border" style="color: var(--pigment-bark);">
    <h4 style="color: var(--ink);">wood</h4>
    <svg class="wave" width="100%" height="20" viewBox="0 0 160 20" preserveAspectRatio="none"><path d="M4 16 l10 -12 l6 12 M50 16 l10 -12 l6 12 M110 16 l10 -12 l6 12" fill="none" stroke="currentColor" stroke-width="2" filter="url(#lf-wobble)"></path></svg>
    <div class="use">confirmation &amp; placing — warm tap, object set down, book close</div>
  </div>
  <div class="fam lf-drawn-border" style="color: var(--pigment-berry);">
    <h4 style="color: var(--ink);">pencil</h4>
    <svg class="wave" width="100%" height="20" viewBox="0 0 160 20" preserveAspectRatio="none"><path d="M2 14 q 20 -6 40 -2 M50 10 q 24 -4 44 2 M104 14 q 26 -8 52 -4" fill="none" stroke="currentColor" stroke-width="2" filter="url(#lf-dry)"></path></svg>
    <div class="use">creation &amp; authorship — words appearing, drawing, star-word pin</div>
  </div>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
