<!-- @dsCard group="Colors" viewport="700x195" name="The 10 Pigments" subtitle="A counted palette at watercolor saturation — solid pull and 42% wash" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 12px; }
  .p { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 62px; }
  .pull { width: 46px; height: 62px; border-radius: 8px 10px 9px 11px; filter: url(#lf-wash-edge); }
  .wash { width: 46px; height: 26px; border-radius: 9px 7px 10px 8px; filter: url(#lf-wash-edge); }
  .p b { font-family: var(--font-parent); font-size: 10.5px; font-weight: 500; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="p"><div class="pull" style="background:#E2A93B"></div><div class="wash" style="background:color-mix(in srgb,#E2A93B 42%,transparent)"></div><b>marigold</b></div>
  <div class="p"><div class="pull" style="background:#EFC85C"></div><div class="wash" style="background:color-mix(in srgb,#EFC85C 42%,transparent)"></div><b>butter</b></div>
  <div class="p"><div class="pull" style="background:#D95B43"></div><div class="wash" style="background:color-mix(in srgb,#D95B43 42%,transparent)"></div><b>terracotta</b></div>
  <div class="p"><div class="pull" style="background:#7C9A62"></div><div class="wash" style="background:color-mix(in srgb,#7C9A62 42%,transparent)"></div><b>sage</b></div>
  <div class="p"><div class="pull" style="background:#4E7FA3"></div><div class="wash" style="background:color-mix(in srgb,#4E7FA3 42%,transparent)"></div><b>river</b></div>
  <div class="p"><div class="pull" style="background:#2E8B8B"></div><div class="wash" style="background:color-mix(in srgb,#2E8B8B 42%,transparent)"></div><b>teal</b></div>
  <div class="p"><div class="pull" style="background:#9B4A6B"></div><div class="wash" style="background:color-mix(in srgb,#9B4A6B 42%,transparent)"></div><b>berry</b></div>
  <div class="p"><div class="pull" style="background:#5D6A8A"></div><div class="wash" style="background:color-mix(in srgb,#5D6A8A 42%,transparent)"></div><b>dusk</b></div>
  <div class="p"><div class="pull" style="background:#5B4637"></div><div class="wash" style="background:color-mix(in srgb,#5B4637 42%,transparent)"></div><b>bark</b></div>
  <div class="p"><div class="pull" style="background:#5B4B7A"></div><div class="wash" style="background:color-mix(in srgb,#5B4B7A 42%,transparent)"></div><b>plum</b></div>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
