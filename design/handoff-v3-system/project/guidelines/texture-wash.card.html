<!-- @dsCard group="Texture" viewport="700x160" name="Wash Bloom" subtitle="Pigment fields get wandering wet edges — rugs, covers, pools, endpapers; never on type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; align-items: center; gap: 26px; padding: 20px 28px; }
  .blob { width: 128px; height: 100px; filter: url(#lf-wash-edge); }
  .lbl { font-family: var(--font-parent); font-size: 11px; color: var(--ink-soft); margin-top: 8px; text-align: center; }
</style>
</head>
<body>
  <div>
    <div class="blob" style="background: color-mix(in srgb, var(--pigment-river) 45%, transparent); border-radius: 46% 54% 50% 50% / 52% 48% 52% 48%;"></div>
    <div class="lbl">wash field (#lf-wash-edge)</div>
  </div>
  <div>
    <div class="blob" style="background: color-mix(in srgb, var(--pigment-marigold) 48%, transparent); border-radius: 50% 50% 46% 54% / 48% 52% 48% 52%; box-shadow: inset 0 0 0 5px color-mix(in srgb, var(--pigment-marigold) 24%, transparent);"></div>
    <div class="lbl">dried edge = darker rim</div>
  </div>
  <div>
    <div class="blob" style="background: radial-gradient(closest-side, color-mix(in srgb, var(--pigment-teal) 52%, transparent), color-mix(in srgb, var(--pigment-teal) 30%, transparent)); border-radius: 52% 48% 50% 50% / 50% 50% 46% 54%;"></div>
    <div class="lbl">pooled center</div>
  </div>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
