        <div style={cell}><Endpaper pigment="river" motif="boat"></Endpaper></div>

      <div>
        <div style={cell}><Endpaper pigment="plum" motif="moon" loading={true}></Endpaper></div>

      </div>
      <div>
        <div style={cell}><Endpaper pigment="sage" motif="leaf"></Endpaper></div>
