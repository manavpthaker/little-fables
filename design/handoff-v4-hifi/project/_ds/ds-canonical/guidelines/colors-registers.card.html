<!-- @dsCard group="Colors" viewport="700x200" name="Three Lighting Registers" subtitle="Day · Story · Lantern — token scopes, one light language" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 14px; padding: 16px 18px; }
  .reg { flex: 1; height: 160px; border-radius: var(--radius-card); background-color: var(--surface-ground); background-image: var(--texture-paper); position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 12px 14px; box-sizing: border-box; }
  .reg b { font-family: var(--font-parent); font-size: 11px; font-weight: 500; color: var(--text-soft); position: relative; }
  .pool { position: absolute; border-radius: 50%; filter: url(#lf-wash-edge); }
  .lines { position: absolute; left: 16px; top: 22px; right: 16px; }
  .lines div { height: 5px; border-radius: 3px; background: var(--ink-soft); opacity: 0.5; margin-bottom: 9px; }
</style>
</head>
<body>
  <div class="reg">
    <div class="pool" style="left:-20px; top:-30px; width:130px; height:130px; background: var(--light-pool);"></div>
    <div class="pool" style="left:10px; top:0; width:70px; height:70px; background: rgba(239,200,92,0.2);"></div>
    <b>Day — paper ground, window light</b>
  </div>
  <div class="reg" data-register="story" style="background-color: var(--surface-ground);">
    <div class="lines"><div style="width:88%"></div><div style="width:94%"></div><div style="width:70%"></div></div>
    <b>Story — the page governs, chrome recedes</b>
  </div>
  <div class="reg" data-register="lantern" style="background-color: var(--surface-ground);">
    <div class="pool" style="right:-10px; top:14px; width:110px; height:110px; background: var(--light-pool);"></div>
    <div class="pool" style="right:20px; top:44px; width:50px; height:50px; background: rgba(243,199,122,0.38);"></div>
    <b style="color: var(--text-soft);">Lantern — indigo ground, gold pools</b>
  </div>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
