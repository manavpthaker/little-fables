<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; align-items: center; gap: 26px; padding: 18px 30px; min-height: 104px; box-sizing: border-box; }
  .glyph { flex: none; }
  .rule { font-family: var(--font-body); font-size: 21px; line-height: 1.42; color: var(--ink); margin: 0; max-width: 500px; text-wrap: pretty; }
</style>
</head>
<body>
  <div class="glyph"><svg width="120" height="86" viewBox="0 0 120 86">
      <g filter="url(#lf-wobble)">
        <circle cx="20" cy="43" r="7" fill="color-mix(in srgb, #7C9A62 60%, transparent)" stroke="var(--ink)" stroke-width="1.8"></circle>
        <circle cx="42" cy="43" r="7" fill="color-mix(in srgb, #4E7FA3 60%, transparent)" stroke="var(--ink)" stroke-width="1.8"></circle>
        <circle cx="64" cy="43" r="7" fill="color-mix(in srgb, #E2A93B 60%, transparent)" stroke="var(--ink)" stroke-width="1.8"></circle>
        <circle cx="86" cy="43" r="7" fill="color-mix(in srgb, #9B4A6B 60%, transparent)" stroke="var(--ink)" stroke-width="1.8"></circle>
        <circle cx="108" cy="43" r="7" fill="none" stroke="var(--ink-faint)" stroke-width="1.8" stroke-dasharray="3 4"></circle>
      </g>
    </svg></div>
  <p class="rule">A screen never asks a child to choose between more than five things. Usually fewer. Often one.</p>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
