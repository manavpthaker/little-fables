<!-- @dsCard group="Constitution" viewport="700x140" name="I · One Terracotta Action" subtitle="The single hero accent = the one primary action per screen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; align-items: center; gap: 26px; padding: 18px 30px; min-height: 104px; box-sizing: border-box; }
  .glyph { flex: none; }
  .rule { font-family: var(--font-body); font-size: 21px; line-height: 1.42; color: var(--ink); margin: 0; max-width: 500px; text-wrap: pretty; }
</style>
</head>
<body>
  <div class="glyph"><svg width="110" height="86" viewBox="0 0 110 86">
      <rect x="8" y="26" width="26" height="34" rx="7" fill="none" stroke="var(--ink-faint)" stroke-width="2" filter="url(#lf-wobble)"></rect>
      <rect x="42" y="20" width="30" height="44" rx="8" fill="color-mix(in srgb, #D95B43 42%, transparent)" filter="url(#lf-wash-edge)"></rect>
      <rect x="42" y="20" width="30" height="44" rx="8" fill="none" stroke="var(--ink)" stroke-width="2.4" filter="url(#lf-wobble)"></rect>
      <rect x="80" y="26" width="26" height="34" rx="7" fill="none" stroke="var(--ink-faint)" stroke-width="2" filter="url(#lf-wobble)"></rect>
    </svg></div>
  <p class="rule">One terracotta action per screen. The next right thing glows like lamplight; everything else rests.</p>
  <script src="../assets/lf-filters.js"></script>
</body>
</html>
