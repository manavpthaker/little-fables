<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  button { border: none; background: none; padding: 0; font: inherit; -webkit-tap-highlight-color: transparent; }
  a { color: var(--pigment-river); }
  a:hover { color: var(--pigment-terracotta); }
  ::selection { background: rgba(242, 196, 96, 0.45); }
  /* Reduced-motion PREVIEW (Tweaks) mirrors tokens/motion.css:
     loops hold their resting frame; transitions become quiet dissolves. */
  [data-reduce] {
    --motion-breath: 0ms;
    --motion-wobble: 0ms;
    --motion-bloom: 0ms;
    --motion-page-turn: 200ms;
    --motion-kamishibai: 200ms;
    --motion-endpaper: 200ms;
  }
  /* Story register keeps warm ink on paper even inside the lantern scope
     ("the page's own palette governs; chrome recedes to ink on paper"). */
  [data-register="story"] {
    --ink: #46362A;
    --ink-soft: #6E5B49;
    --ink-faint: #97836B;
    --text-color: #46362A;
    --text-soft: #6E5B49;
  }
</style>
